# Railway deployment config.
# Reference: https://docs.railway.com/reference/config-as-code
#
# Builder uses our Dockerfile. Health check pings GET / which returns
# {"status":"ok"} from api.py.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No startCommand here - the Dockerfile's CMD already wraps uvicorn in
# `sh -c "..."` so $PORT expands correctly. If we override startCommand
# from railway.toml, Railway runs it without a shell and $PORT is passed
# literally, which breaks startup.
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Recommended environment variables (set in Railway dashboard):
#   OPENROUTER_API_KEY   - required, your OpenRouter key
#   SEARXNG_URL          - URL of your SearXNG instance (a sibling service)
#   LLM_CONCURRENCY      - default 12; bump on larger plans
#   SEARCH_CONCURRENCY   - default 8
#   SCRAPE_CONCURRENCY   - default 4
#   ABSOLUTE_MAX_COST    - default 5.0 USD per request
